<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squad 140</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🔥 FLOATING NAVBAR -->
  <nav class="floating-nav">

    <div class="nav-left">
      <div class="logo"></div>
      <span class="brand-name">Squad_140</span>
    </div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Members</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Timeline</a></li>
    </ul>

    <div class="nav-search">
      <input type="text" placeholder="Search">
    </div>

  </nav>


  <!-- 🧱 MAIN WRAPPER -->
  <main class="dashboard">


    <!-- 🔴 HERO SECTION -->
    <section class="hero-section">

      <div class="hero">
        <h1 class="hero-title">Heading</h1>
      </div>

      <div class="stats">

        <div class="stat-card">
          <div class="stat-inner">
            <p>members : 44</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-inner">
            <p>projects built</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-inner">
            <p>build time</p>
          </div>
        </div>

      </div>

    </section>


    <!-- ⚫ GUIDER’S LEGACY SECTION -->
    <section class="guiders-section">

      <h2 class="section-title">Guider’s legacy...</h2>

      <div class="guiders-content">

        <!-- angled visual box -->
        <div class="guiders-visual"></div>

        <!-- guider list -->
        <div class="guiders-list">

          <div class="guider-card">
            <p>rishwanth</p>
          </div>

          <div class="guider-card">
            <p>sathya.S</p>
          </div>

          <div class="guider-card">
            <p>student name</p>
          </div>

        </div>

      </div>

    </section>


    <!-- ⚫ TIMELINE SECTION -->
    <section class="timeline-section">

      <h2 class="section-title">Time_Line :</h2>

      <div class="timeline-chart">

        <div class="timeline-box"></div>
        <div class="timeline-box"></div>
        <div class="timeline-box"></div>

        <div class="timeline-line"></div>

      </div>

    </section>


  </main>

</body>
</html>
